<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Luminal DocGuard</title>
  <style>
    :root { color-scheme: dark; --bg:#0b1118; --panel:#111a24; --line:#253342; --text:#e6edf3; --muted:#8ea0b4; --mint:#44d19b; --red:#ff786e; --amber:#e4b65c; }
    * { box-sizing:border-box; } body { margin:0; background:var(--bg); color:var(--text); font:14px/1.45 ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    main { max-width:1180px; margin:0 auto; padding:42px 24px 72px; } header { display:flex; align-items:flex-end; justify-content:space-between; gap:24px; border-bottom:1px solid var(--line); padding-bottom:28px; }
    .eyebrow { color:var(--mint); text-transform:uppercase; letter-spacing:.13em; font-size:11px; font-weight:700; } h1 { margin:8px 0 0; font-size:34px; letter-spacing:-.02em; } h2 { margin:0; font-size:18px; } .meta { color:var(--muted); text-align:right; font-size:12px; }
    .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin:24px 0; } .stat { background:var(--panel); border:1px solid var(--line); padding:18px; border-radius:7px; } .stat strong { display:block; font-size:28px; } .stat span { color:var(--muted); }
    .toolbar { display:flex; gap:8px; align-items:center; margin:22px 0 12px; } button { background:transparent; color:var(--muted); border:1px solid var(--line); padding:8px 12px; border-radius:5px; cursor:pointer; } button.active, button:hover { color:var(--text); border-color:var(--mint); } .count { margin-left:auto; color:var(--muted); }
    .rows { display:grid; gap:8px; } .row { width:100%; text-align:left; background:var(--panel); border:1px solid var(--line); color:inherit; padding:15px 17px; display:grid; grid-template-columns:1fr auto; gap:8px 18px; } .row:hover { border-color:#4c697f; } .path { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:13px; } .line { color:var(--muted); } .status { font-weight:700; font-size:12px; text-transform:uppercase; letter-spacing:.05em; } .passed { color:var(--mint); } .failed { color:var(--red); } .not_executed,.not_run { color:var(--amber); } .ignored,.timeout,.tool_unavailable { color:var(--red); }
    .detail { margin-top:18px; background:#0e1721; border:1px solid var(--line); padding:20px; border-radius:7px; } pre { white-space:pre-wrap; overflow:auto; color:#c8d3df; font:12px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; } .empty { color:var(--muted); padding:28px; text-align:center; border:1px dashed var(--line); }
    @media (max-width:700px) { header { display:block; } .meta { text-align:left; margin-top:16px; } .stats { grid-template-columns:repeat(2,1fr); } main { padding:28px 15px 54px; } }
  </style>
</head>
<body>
<main>
  <header><div><div class="eyebrow">Compiler-backed documentation review</div><h1>Luminal DocGuard</h1></div><div class="meta" id="meta">Loading pinned report...</div></header>
  <section class="stats" id="stats"></section>
  <div class="toolbar" id="toolbar"><button class="active" data-filter="all">All</button><button data-filter="failed">Failures</button><button data-filter="not_executed">Not executed</button><button data-filter="passed">Passed</button><span class="count" id="count"></span></div>
  <section class="rows" id="rows"></section><section class="detail" id="detail"><h2>Select a snippet</h2><p class="line">The dashboard reads a JSON artifact. It never runs Cargo in the browser.</p></section>
</main>
<script>
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let report, filter='all';
function status(item){ return item.result.status; }
function render(){
  const counts=report.summary.counts||{};
  document.getElementById('meta').innerHTML=`${esc(report.repository.commit.slice(0,12))} · ${esc(report.tool.name)} ${esc(report.tool.version)}<br>${esc(report.generated_at)} · ${report.execution.requested?'Cargo requested':'parsed only'}`;
  document.getElementById('stats').innerHTML=[['total_rust_fences',report.summary.total_rust_fences,'Rust fences'],['passed',counts.passed||0,'Cargo passed'],['failed',counts.failed||0,'Cargo failed'],['not_executed',counts.not_executed||0,'Contextual']].map(x=>`<div class="stat"><strong>${x[1]}</strong><span>${x[2]}</span></div>`).join('');
  const items=report.snippets.filter(x=>filter==='all'||status(x)===filter); document.getElementById('count').textContent=`${items.length} shown`;
  document.getElementById('rows').innerHTML=items.length?items.map((x,i)=>`<button class="row" data-id="${esc(x.id)}"><span><span class="path">${esc(x.path)}</span><br><span class="line">lines ${x.line_start}-${x.line_end} · ${esc(x.mode)}</span></span><span class="status ${esc(status(x))}">${esc(status(x))}</span></button>`).join(''):'<div class="empty">No snippets match this filter.</div>';
  document.querySelectorAll('.row').forEach(el=>el.onclick=()=>show(el.dataset.id));
}
function show(id){ const x=report.snippets.find(s=>s.id===id); const d=x.result||{}; document.getElementById('detail').innerHTML=`<h2>${esc(x.path)}:${x.line_start}</h2><p class="line">${esc(x.mode)} · ${esc(status(x))} · source ${esc(x.source_sha256.slice(0,16))}</p><pre>${esc(d.diagnostic||x.reason||'No diagnostic recorded.')}</pre>`; }
document.querySelectorAll('[data-filter]').forEach(b=>b.onclick=()=>{filter=b.dataset.filter;document.querySelectorAll('[data-filter]').forEach(x=>x.classList.toggle('active',x===b));render();});
fetch('report.json').then(r=>r.json()).then(x=>{report=x;render();}).catch(()=>document.getElementById('rows').innerHTML='<div class="empty">Place a generated report.json beside this page.</div>');
</script>
</body>
</html>
